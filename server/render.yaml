services:
  - type: web
    name: contact-location-tracker
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    rootDir: server
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 3306
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: CLIENT_URL
        value: https://cttracker.vercel.app
      - key: ADMIN_URL
        value: https://location-trackeradmin.vercel.app
      - key: ALLOW_ALL_ORIGINS
        value: false
      # RENDER_EXTERNAL_URL is automatically injected by Render for all web services.
      # The keep-alive pinger in server.js uses it — no manual configuration needed.
